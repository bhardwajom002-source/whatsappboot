name: JavaGoat-WhatsApp-Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Bot (Test Mode)
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: |
          echo "Starting bot for test..."
          timeout 20s node index.js || true
          echo "Bot test completed"
